
name: 'Terraform'

on:
  push:
    branches: [ "master" ]
  pull_request:

permissions:
  id-token: write
  contents: read

# env:
  # ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  # ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  # ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  # ARM_USE_OIDC: true

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        # auth-type: IDENTITY

    # Install the latest version of Terraform CLI and configure the Terraform CLI configuration file with a Terraform Cloud user API token
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1

    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
    - name: Terraform Init
      run: terraform init

    # Checks that all Terraform configuration files adhere to a canonical format
    #- name: Terraform Format
    #  run: terraform fmt -check

    # Generates an execution plan for Terraform
    - name: Terraform Plan
      run: terraform plan -input=false

      # On push to "master", build or change infrastructure according to Terraform configuration files
      # Note: It is recommended to set up a required "strict" status check in your repository for "Terraform Cloud". See the documentation on "strict" required status checks for more information: https://help.github.com/en/github/administering-a-repository/types-of-required-status-checks
    - name: Terraform Apply
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      run: terraform apply -auto-approve -input=false

    # 7. Extract the storage account name cleanly using step outputs
    - name: Get Storage Account Name
      id: get_sa_name
      run: |
        # Strip all formatting and isolate the name: modelinfoaccount
        CLEAN_NAME=$(terraform output -raw storage_account_name | grep -o 'modelinfoaccount' | head -n 1 | tr -d '\r\n ')
        echo "storage_account=$CLEAN_NAME" >> $GITHUB_OUTPUT

    # 7. Dump the text and scrub out the HashiCorp setup-terraform wrapper text
    - name: Save Storage Account Name to File
      run: |
        terraform output -raw storage_account_name > raw_output.txt
        
        # Use grep and sed to isolate exactly your clean account name: modelinfoaccount
        cat raw_output.txt | grep -o 'modelinfoaccount' | head -n 1 | tr -d '\r\n ' > sa_name.txt

    # 8. Whitelist IP, Upload CSV Files, and Restore Security Firewall
    - name: Upload CSV Files to Private Azure Blob
      uses: azure/cli@v2
      env:
        TARGET_ACCOUNT: ${{ steps.get_sa_name.outputs.storage_account }}
        RESOURCE_GROUP: "archi-ea-app-rg"
      with:
        inlineScript: |
          # Fetch the public IP of the runner cleanly inside the container
          RUNNER_IP=$(curl -s https://ifconfig.me)
          echo "GitHub Runner Public IP identified as: $RUNNER_IP"
          
          # Temporarily allow public network paths and authorize the runner's IP
          echo "Temporarily modifying Azure firewall rules..."
          az storage account update --name "$TARGET_ACCOUNT" --resource-group "$RESOURCE_GROUP" --public-network-access Enabled
          
          # FIXED TYPO: Changed --name to --account-name below
          az storage account network-rule add --account-name "$TARGET_ACCOUNT" --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP"
          
          # Wait 20 seconds for Azure's firewall changes to propagate globally
          sleep 20
          
          # Execute file upload 
          echo "Uploading CSV files..."
          az storage blob upload-batch \
            --account-name "$TARGET_ACCOUNT" \
            --destination "data-files" \
            --source "." \
            --pattern "*.csv" \
            --overwrite true \
            --auth-mode login
            
          # Clean up and lock the account back down
          echo "Restoring secure private network baseline..."
          # FIXED TYPO: Changed --name to --account-name below
          az storage account network-rule remove --account-name "$TARGET_ACCOUNT" --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP"
          az storage account update --name "$TARGET_ACCOUNT" --resource-group "$RESOURCE_GROUP" --public-network-access Disabled

