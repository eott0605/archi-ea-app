name: 'Terraform'

on:
  push:
    branches: [ "master" ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Pre-Register Azure SQL Provider
      run: |
        az provider register --namespace "Microsoft.Sql"
        sleep 15

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false 

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -input=false

    - name: Terraform Apply
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      run: terraform apply -auto-approve -input=false

    # FIXED: Added the SQL Server resource group name output tracker
    - name: Get Infrastructure Variables
      id: get_vars
      run: |
        ACCOUNT_NAME=$(terraform output -raw storage_account_name)
        echo "storage_account=$ACCOUNT_NAME" >> $GITHUB_OUTPUT
        
        CONN_STR=$(terraform output -raw storage_connection_string)
        echo "connection_string=$CONN_STR" >> $GITHUB_OUTPUT
        
        SQL_FQDN=$(terraform output -raw sql_server_fqdn)
        echo "sql_server=$SQL_FQDN" >> $GITHUB_OUTPUT

    - name: Upload CSV Files to Private Azure Blob
      env:
        TARGET_ACCOUNT: ${{ steps.get_vars.outputs.storage_account }}
        CONNECTION_STRING: ${{ steps.get_vars.outputs.connection_string }}
        RESOURCE_GROUP: "archi-ea-app-rg"
      run: |
        RUNNER_IP=$(curl -s https://ifconfig.me)
        az storage account network-rule add --account-name "$TARGET_ACCOUNT" --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP"
        sleep 45
        
        az storage blob upload-batch \
          --destination "modelinfocontainer" \
          --source "." \
          --pattern "*.csv" \
          --overwrite true \
          --connection-string "$CONNECTION_STRING"
          
        az storage account network-rule remove --account-name "$TARGET_ACCOUNT" --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP"

    # FIXED: Explicitly install the Microsoft ODBC Driver binaries on the Ubuntu runner node host
    # FIXED: Prepended sudo directly to commands and modernized repository configuration
    - name: Install System ODBC SQL Drivers
      run: |
        echo "Adding Microsoft package signing key..."
        curl -fsSL https://microsoft.com | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
        
        echo "Adding Microsoft production repository listing..."
        curl -fsSL https://microsoft.com(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
        
        echo "Updating apt caches..."
        sudo apt-get update
        
        echo "Installing Microsoft ODBC 18 driver binaries..."
        sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18


    - name: Setup Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas pyodbc azure-identity

    # FIXED: Whitelists runner IP against SQL Server before execution and strips it immediately after
    # FIXED: Handled the text parsing directly inside the Bash execution block
    # FIXED: Swapped IP whitelisting for a brief Network DefaultAction toggle to bypass regional Azure NAT routing bugs
    - name: Upload CSV Files to db
      env:
        TARGET_ACCOUNT: ${{ steps.get_vars.outputs.storage_account }}
        CONNECTION_STRING: ${{ steps.get_vars.outputs.connection_string }}
        RESOURCE_GROUP: "archi-ea-app-rg"
      run: |
        echo "Temporarily opening Storage Account public access tier..."
        az storage account update \
          --name "$TARGET_ACCOUNT" \
          --resource-group "$RESOURCE_GROUP" \
          --default-action Allow
        
        echo "Waiting 15 seconds for network rules to propagate..."
        sleep 15
        
        echo "Uploading CSV files..."
        az storage blob upload-batch \
          --destination "modelinfocontainer" \
          --source "." \
          --pattern "*.csv" \
          --overwrite true \
          --connection-string "$CONNECTION_STRING"
          
        echo "Restoring secure private baseline network rules..."
        az storage account update \
          --name "$TARGET_ACCOUNT" \
          --resource-group "$RESOURCE_GROUP" \
          --default-action Deny

