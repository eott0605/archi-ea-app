name: 'Terraform'

on:
  push:
    branches: [ "master" ]
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
    # 1. Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4

    # 2. Log in securely via OIDC
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # 3. Install Terraform CLI
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1

    # 4. Initialize Terraform directory configuration
    - name: Terraform Init
      run: terraform init

    # 5. Generates an execution plan for Terraform
    - name: Terraform Plan
      run: terraform plan -input=false

    # 6. Apply changes on push to master branch
    - name: Terraform Apply
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      run: terraform apply -auto-approve -input=false

    # 7. FIXED: Combined extraction of account name and connection string to GITHUB_OUTPUT
    - name: Get Storage Account Variables
      id: get_sa_vars
      run: |
        CLEAN_NAME=$(terraform output -raw storage_account_name | grep -o 'modelinfoaccount' | head -n 1 | tr -d '\r\n ')
        echo "storage_account=$CLEAN_NAME" >> $GITHUB_OUTPUT
        
        CONN_STR=$(terraform output -raw storage_connection_string | tr -d '\r\n')
        echo "connection_string=$CONN_STR" >> $GITHUB_OUTPUT

    # 8. High-speed direct upload using the secure connection string bypass
    - name: Upload CSV Files to Azure Blob
      uses: azure/cli@v2
      env:
        TARGET_ACCOUNT: ${{ steps.get_sa_vars.outputs.storage_account }}
        CONNECTION_STRING: ${{ steps.get_sa_vars.outputs.connection_string }}
      with:
        inlineScript: |
          echo "Uploading CSV files directly via secure connection string bypass..."
          
          az storage blob upload-batch \
            --destination "modelinfocontainer" \
            --source "." \
            --pattern "*.csv" \
            --overwrite true \
            --connection-string "$CONNECTION_STRING"
