name: 'Terraform'

on:
  push:
    branches: [ "master" ]
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4

    # Log in securely via OIDC
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # NEW STEP: Force Azure to register the SQL provider before Terraform runs
    - name: Pre-Register Azure SQL Provider
      run: |
        echo "Ensuring Microsoft.Sql provider namespace is active..."
        az provider register --namespace "Microsoft.Sql"
        
        # Give the Azure subscription fabric a brief moment to sync the registration status
        sleep 15

    # Upgrade to v3 and add the wrapper configuration
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3  # <-- Changed v1 to v3
      with:
        terraform_wrapper: false 

    # Initialize Terraform directory configuration
    - name: Terraform Init
      run: terraform init

    # Generates an execution plan for Terraform
    - name: Terraform Plan
      run: terraform plan -input=false

    # Apply changes on push to master branch
    - name: Terraform Apply
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      run: terraform apply -auto-approve -input=false

    # Extract variables cleanly using the v3 wrapperless outputs
    - name: Get Storage Account Variables
      id: get_sa_vars
      run: |
        ACCOUNT_NAME=$(terraform output -raw storage_account_name)
        echo "storage_account=$ACCOUNT_NAME" >> $GITHUB_OUTPUT
        
        CONN_STR=$(terraform output -raw storage_connection_string)
        echo "connection_string=$CONN_STR" >> $GITHUB_OUTPUT

    # Whitelist IP, Wait for Network Sync, and Upload CSV Files
    - name: Upload CSV Files to Private Azure Blob
      env:
        TARGET_ACCOUNT: ${{ steps.get_sa_vars.outputs.storage_account }}
        CONNECTION_STRING: ${{ steps.get_sa_vars.outputs.connection_string }}
        RESOURCE_GROUP: "archi-ea-app-rg"
      run: |
        # A. Fetch the dynamic public IP of the runner cleanly
        RUNNER_IP=$(curl -s https://ifconfig.me)
        echo "GitHub Runner Public IP identified as: $RUNNER_IP"
        
        # B. Open firewall natively using the runner's pre-authenticated token
        echo "Temporarily modifying Azure firewall rules..."
        az storage account network-rule add --account-name "$TARGET_ACCOUNT" --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP"
        
        # C. FIXED TIMING LOCATION: Wait 45 seconds right here to let the firewall sync!
        echo "Waiting 45 seconds for Azure firewall rules to propagate globally..."
        sleep 45
        
        # D. Execute file upload securely via Connection String
        echo "Uploading CSV files..."
        az storage blob upload-batch \
          --destination "modelinfocontainer" \
          --source "." \
          --pattern "*.csv" \
          --overwrite true \
          --connection-string "$CONNECTION_STRING"
          
        # E. Clean up: Delete the runner IP rule, leaving your laptop IP intact!
        echo "Restoring secure private network baseline..."
        az storage account network-rule remove --account-name "$TARGET_ACCOUNT" --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP"


